<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深夜探索 | 熬夜行为可视化分析</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: rgba(20, 30, 50, 0.85);
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.4);
            --secondary: #7c3aed;
            --tertiary: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --pink: #ec4899;
            --text-main: #f0f4f8;
            --text-muted: #8492a6;
            --border: rgba(100, 140, 200, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 星空背景 */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.85);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 5px;
            gap: 5px;
        }

        .nav-tab {
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: none;
            background: transparent;
        }

        .nav-tab:hover {
            color: var(--text-main);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* 主容器 */
        .main-container {
            padding: 25px;
            position: relative;
            z-index: 1;
        }

        .page-section {
            display: none;
        }

        .page-section.active {
            display: block;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent), var(--secondary), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* KPI 卡片 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.15);
        }

        .kpi-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 15px;
        }

        .kpi-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .kpi-unit {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .chart-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            min-height: 380px;
        }

        .chart-panel.tall {
            min-height: 620px;
        }

        .chart-panel.tall .chart-body {
            min-height: 520px;
        }

        .chart-panel:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .chart-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
        }

        .chart-btn, .custom-select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .chart-btn:hover, .chart-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
        }

        .custom-select {
            min-width: 150px;
        }

        .custom-select option {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .chart-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 列宽 */
        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }
        .col-6 { grid-column: span 6; }
        .col-7 { grid-column: span 7; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(10, 14, 26, 0.95);
            border: 1px solid var(--accent);
            padding: 14px 18px;
            border-radius: 12px;
            pointer-events: none;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 280px;
            line-height: 1.6;
        }

        .tooltip-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            padding: 2px 0;
        }

        /* 图例 */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* 加载动画 */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 20px;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 3px;
        }

        /* D3 图表样式 */
        .axis line, .axis path {
            stroke: var(--border);
        }

        .axis text {
            fill: var(--text-muted);
            font-size: 11px;
        }

        /* 信息框 */
        .info-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-box i {
            color: var(--accent);
            font-size: 1.2rem;
        }

        /* 自定义滑块样式 */
        #ageGroupSlider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6), 0 0 20px rgba(0, 212, 255, 0.3);
            transition: all 0.2s ease;
            border: 2px solid white;
        }

        #ageGroupSlider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8), 0 0 30px rgba(0, 212, 255, 0.5);
        }

        #ageGroupSlider::-webkit-slider-thumb:active {
            transform: scale(1.1);
        }

        #ageGroupSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6), 0 0 20px rgba(0, 212, 255, 0.3);
            transition: all 0.2s ease;
            border: 2px solid white;
        }

        #ageGroupSlider::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8), 0 0 30px rgba(0, 212, 255, 0.5);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .col-4, .col-5, .col-6, .col-7, .col-8 {
                grid-column: span 6;
            }
        }

        @media (max-width: 768px) {
            .col-4, .col-5, .col-6, .col-7, .col-8, .col-12 {
                grid-column: span 12;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050810;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>

<div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">LOADING DATA...</div>
</div>

<div class="stars-bg" id="stars"></div>

<header class="header">
    <div class="logo">
        <div class="logo-icon">
            <i class="fa-solid fa-moon"></i>
        </div>
        <span class="logo-text">NIGHTWATCH</span>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" data-page="overview">
            <i class="fa-solid fa-chart-pie"></i> 健康影响
        </button>
        <button class="nav-tab" data-page="behavior">
            <i class="fa-solid fa-clock"></i> 熬夜行为
        </button>
        <button class="nav-tab" data-page="health">
            <i class="fa-solid fa-heartbeat"></i> 社交媒体
        </button>
        <button class="nav-tab" data-page="global">
            <i class="fa-solid fa-globe"></i> 全球对比
        </button>
    </div>
</header>

<main class="main-container">
    <!-- ========== 第一页：总览 ========== -->
    <section class="page-section active" id="page-overview">
        <div class="page-header">
            <h1 class="page-title">🌙 深夜数据观察站</h1>
            <p class="page-subtitle">探索现代人的熬夜行为模式与健康影响</p>
        </div>

        <div class="charts-grid">
            <div class="chart-panel col-8">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-circle-nodes" style="color: var(--accent);"></i>
                        <span>运动量 vs 睡眠质量分析</span>
                    </div>
                    <div class="chart-controls">
                        <select class="custom-select" id="occupationFilter">
                            <option value="all">所有职业</option>
                        </select>
                    </div>
                </div>
                <div class="chart-body" id="scatter-chart"></div>
                <div class="legend" id="scatter-legend"></div>
            </div>

            <div class="chart-panel col-4">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-bullseye" style="color: var(--secondary);"></i>
                        <span>健康指标雷达</span>
                    </div>
                </div>
                <div class="chart-body" id="radar-chart"></div>
                <p style="text-align:center; color: var(--text-muted); font-size: 0.8rem; margin-top: 10px;">
                    悬停左侧气泡查看个人数据
                </p>
            </div>

            <div class="chart-panel col-6" style="min-height: 520px;">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-arrow-right-arrow-left" style="color: var(--tertiary);"></i>
                        <span>BMI类别与睡眠障碍流向</span>
                    </div>
                </div>
                <div class="chart-body" id="stacked-bar-chart"></div>
            </div>

            <div class="chart-panel col-6" style="min-height: 520px;">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-chart-line" style="color: var(--pink);"></i>
                        <span>压力与睡眠时长</span>
                    </div>
                </div>
                <div class="chart-body" id="stress-sleep-chart"></div>
            </div>
        </div>
    </section>

    <!-- ========== 第二页：熬夜行为分析 ========== -->
    <section class="page-section" id="page-behavior">
        <div class="page-header">
            <h1 class="page-title">⏰ 熬夜行为深度分析</h1>
            <p class="page-subtitle">了解人们在深夜都在做什么</p>
        </div>

        

        <div class="charts-grid">
            <div class="chart-panel col-12 tall">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-wave-square" style="color: var(--success);"></i>
                        <span>深夜活动流量演变</span>
                    </div>
                </div>
                <div class="chart-body" id="streamgraph-chart"></div>
            </div>
        </div>
    </section>

    <!-- ========== 第三页：健康影响分析 ========== -->
    <section class="page-section" id="page-health">
        <div class="page-header">
            <h1 class="page-title">💊 社交媒体分析</h1>
            <p class="page-subtitle">探索社交媒体使用与睡眠健康的关联</p>
        </div>

        <div class="charts-grid">
            <div class="chart-panel col-8" style="min-height: 500px;">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-diagram-project" style="color: var(--pink);"></i>
                        <span>不同社交媒体对不同年龄段及睡眠质量的影响</span>
                    </div>
                    <div class="chart-controls" style="display: flex; flex-direction: column; gap: 8px; min-width: 280px;">
                        <div id="ageSliderLabel" style="font-size: 0.85rem; color: var(--accent); font-weight: 600; text-align: center;">18-24岁</div>
                        <div style="position: relative; padding: 0 10px;">
                            <input type="range" id="ageGroupSlider" min="0" max="4" step="1" value="0" 
                                   style="width: 100%; cursor: pointer; appearance: none; height: 6px; background: linear-gradient(90deg, var(--accent), var(--secondary)); border-radius: 3px; outline: none;">
                            <div id="ageSliderMarkers" style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: var(--text-muted);"></div>
                        </div>
                    </div>
                </div>
                <div class="chart-body" id="parallel-coords-chart"></div>
            </div>

            <div class="chart-panel col-4" style="min-height: 500px;">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-mobile-screen" style="color: var(--danger);"></i>
                        <span>平台成瘾指数对比</span>
                    </div>
                </div>
                <div class="chart-body" id="addiction-chart"></div>
            </div>
        </div>
    </section>

    <!-- ========== 第四页：全球对比 ========== -->
    <section class="page-section" id="page-global">
        <div class="page-header">
            <h1 class="page-title">🌍 全球熬夜地图</h1>
            <p class="page-subtitle">对比不同国家和地区的睡眠状况</p>
        </div>

        <div class="charts-grid">
            <div class="chart-panel col-6 tall">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-ranking-star" style="color: var(--tertiary);"></i>
                        <span>各国平均睡眠时长排名</span>
                    </div>
                    <div id="ranking-legend" style="display: flex; align-items: center; gap: 8px; height: 24px;"></div>
                    <div class="chart-controls">
                        <button class="chart-btn active" id="sortAsc">升序</button>
                        <button class="chart-btn" id="sortDesc">降序</button>
                    </div>
                </div>
                <div class="chart-body" id="global-ranking-chart"></div>
            </div>

            <div class="chart-panel col-6 tall">
                <div class="chart-header">
                    <div class="chart-title">
                        <i class="fa-solid fa-globe-asia" style="color: var(--accent);"></i>
                        <span>全球熬夜率地图</span>
                    </div>
                    <div id="globe-legend" style="display: flex; align-items: center; gap: 8px; height: 24px;"></div>
                </div>
                <div class="chart-body" id="global-map-chart"></div>
            </div>
        </div>
    </section>
</main>

<div class="tooltip" id="tooltip"></div>

<script src="index.js"></script>
</body>
</html>
